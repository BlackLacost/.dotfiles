[module/pacman-updates]
type = custom/script
exec = checkupdates | wc -l
interval = 1000
label = Updates: %output%
format-foreground = ${color.foreground}
format-background = ${color.backgroun}
format-prefix = " "
format-prefix-foreground = ${color.amber400}
# format-prefix-background = #ffbb00

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/gmail]
type = custom/script
; TODO Временно выключил звук, так как при первом запуске
; после перезагрузки выодит ошибку, что звук не найдет
exec = ~/.config/polybar/gmail/launch.py --nosound
tail = true
click-left = xdg-open https://mail.google.com

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-open = 
label-open-foreground = ${color.secondary}
label-close =  cancel
label-close-foreground = ${color.secondary}
label-separator = |
label-separator-foreground = ${color.foreground-alt}

menu-0-0 = reboot
menu-0-0-exec = systemctl reboot
menu-0-1 = power off
menu-0-1-exec = systemctl poweroff


